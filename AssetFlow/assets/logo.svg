<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Gradients -->
    <linearGradient id="top-face-grad" x1="20" y1="32" x2="80" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="left-face-grad" x1="20" y1="32" x2="50" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>
    <linearGradient id="right-face-grad" x1="50" y1="49" x2="80" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    
    <!-- Flow Overlay Gradient -->
    <linearGradient id="flow-line-grad" x1="15" y1="15" x2="85" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#A7F3D0" />
    </linearGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="5" y="10" width="90" height="85" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#4F46E5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Isometric Cube Base -->
    <!-- Top Face -->
    <path d="M50 15 L82 33.5 L50 52 L18 33.5 Z" fill="url(#top-face-grad)"/>
    
    <!-- Left Face -->
    <path d="M18 33.5 L50 52 L50 82.5 L18 64 Z" fill="url(#left-face-grad)"/>
    
    <!-- Right Face -->
    <path d="M50 52 L82 33.5 L82 64 M82 64 L50 82.5 L50 52" fill="url(#right-face-grad)"/>
    <!-- Solid fill for right face to ensure depth -->
    <path d="M50 52 L82 33.5 L82 64 L50 82.5 Z" fill="url(#right-face-grad)"/>
    
    <!-- Dynamic Glowing Flow Accent (Wraps around the cube to depict "Flow") -->
    <path d="M18 33.5 L50 52 L82 33.5" stroke="url(#flow-line-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    
    <!-- Inner Diamond Core -->
    <path d="M50 32 L58 37 L50 42 L42 37 Z" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
